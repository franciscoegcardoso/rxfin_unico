name: PR Checks + Build Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── JOB 1: Frontend — TypeScript + ESLint + Build ──────────────
  frontend-gate:
    name: Frontend Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — zero erros
        # SEM || echo — falha real bloqueia o merge
        run: npx tsc --noEmit

      - name: ESLint — no-undef obrigatório
        run: npx eslint src --ext .ts,.tsx --rule '{"no-undef":"error"}' --max-warnings 0

      - name: Vite build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Bundle size check — bloquear chunks > 1MB
        run: |
          OVERSIZED=$(find dist/assets -name "*.js" -size +1000k 2>/dev/null || true)
          if [ -n "$OVERSIZED" ]; then
            echo "❌ Chunks > 1MB detectados (possível bundle monolítico antigo):"
            echo "$OVERSIZED"
            exit 1
          fi
          echo "✅ Tamanho de chunks OK"

  # ── JOB 2: Padrões proibidos ────────────────────────────────────
  pattern-check:
    name: Padrões Proibidos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Proibido — MobileSectionDrawer em pages/
        run: |
          FOUND=$(grep -rn "MobileSectionDrawer" apps/web/src/pages/ \
            --include="*.tsx" 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "❌ MobileSectionDrawer encontrado em pages/ — padrão banido:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ Sem MobileSectionDrawer em pages/"

      - name: Proibido — .rpc().catch() antipatern Supabase JS v2
        run: |
          FOUND=$(grep -rn "\.rpc(.*\.catch(" apps/web/src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "❌ .rpc().catch() detectado — usar { data, error } = await rpc():"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ Sem .rpc().catch() antipatern"

      - name: Auditoria — RPCs chamados no frontend
        run: |
          echo "=== RPCs chamados pelo frontend ==="
          grep -rh "supabase\.rpc(" apps/web/src \
            --include="*.ts" --include="*.tsx" \
            | grep -oP "\.rpc\('[^']+'" \
            | sort -u || true
          echo "=== Verificação concluída ==="

  # ── JOB 3: Edge Functions Deno ──────────────────────────────────
  deno-tests:
    name: Edge Function Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.45.x

      - name: Run Edge Function tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -d "supabase/functions/__tests__" ]; then
            deno test supabase/functions/__tests__/ \
              --allow-net --allow-env --allow-read --no-check
          else
            echo "Sem testes de Edge Functions, pulando"
          fi
