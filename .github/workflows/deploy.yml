name: Deploy

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect migrations
        id: migrations
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            # First push or force push: consider as having migrations if any exist
            HAS_MIGRATIONS=$(git ls-files 'apps/web/supabase/migrations/' 'supabase/migrations/' 2>/dev/null | wc -l)
            [ "$HAS_MIGRATIONS" -gt 0 ] && echo "has_migrations=true" >> $GITHUB_OUTPUT || echo "has_migrations=false" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only "${{ github.event.before }}" HEAD -- apps/web/supabase/migrations/ supabase/migrations/ 2>/dev/null || true)
            if [ -n "$CHANGED" ]; then
              echo "has_migrations=true" >> $GITHUB_OUTPUT
            else
              echo "has_migrations=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Notify n8n webhook
        run: |
          curl -sS -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"branch":"${{ github.ref_name }}","commit":"${{ github.sha }}","has_migrations":${{ steps.migrations.outputs.has_migrations }},"pusher":"${{ github.actor }}"}'
