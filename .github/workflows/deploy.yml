name: Deploy Pipeline
on:
  push:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detectar migrações
        id: migrations
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git ls-files apps/web/supabase/migrations/ supabase/migrations/ 2>/dev/null || true)
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} HEAD -- apps/web/supabase/migrations/ supabase/migrations/ 2>/dev/null || true)
          fi
          HAS=$([ -n "$CHANGED" ] && echo true || echo false)
          echo "has_migrations=$HAS" >> $GITHUB_OUTPUT

      - name: Notificar n8n
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\",\"has_migrations\":${{ steps.migrations.outputs.has_migrations }},\"pusher\":\"${{ github.actor }}\"}"
