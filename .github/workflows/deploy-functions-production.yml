name: Deploy Edge Functions (Production)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      
      - name: Deploy all functions to production
        run: |
          supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      
      - name: Summary
        run: echo "🚀 Edge Functions deployed to production" >> $GITHUB_STEP_SUMMARY
